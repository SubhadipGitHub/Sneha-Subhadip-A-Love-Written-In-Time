<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Wedding Wishes</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg-deep: #13080f;
            --bg-mid: #2a1020;
            --bg-soft: #341227;
            --text-main: #fff4f9;
            --text-muted: #ffddea;
            --line-soft: rgba(255, 255, 255, 0.24);
            --card-bg: rgba(23, 9, 17, 0.76);
            --accent-1: #ff85ac;
            --accent-2: #f5a76f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 157, 194, 0.28), transparent 42%),
                radial-gradient(circle at 78% 12%, rgba(170, 201, 255, 0.18), transparent 39%),
                linear-gradient(155deg, var(--bg-deep), var(--bg-mid) 42%, var(--bg-soft));
            background-position: 0% 0%, 100% 0%, 50% 50%;
            animation: wishBgDrift 16s ease-in-out infinite alternate;
            padding: 1rem;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -18%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                radial-gradient(circle at 18% 30%, rgba(255, 163, 206, 0.25), transparent 52%),
                radial-gradient(circle at 76% 24%, rgba(170, 208, 255, 0.18), transparent 46%),
                radial-gradient(circle at 70% 82%, rgba(255, 190, 206, 0.2), transparent 52%);
            filter: blur(22px) saturate(135%);
            animation: wishOrbs 12.5s ease-in-out infinite alternate;
        }

        body::after {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: soft-light;
            opacity: 0.45;
        }

        .wish-page-card {
            position: relative;
            width: min(640px, 100%);
            border: 1px solid var(--line-soft);
            border-radius: 1.25rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 56px rgba(0, 0, 0, 0.42);
            padding: 1.15rem;
            overflow: hidden;
            animation: cardReveal 700ms ease both;
            z-index: 1;
        }

        .wish-page-card::before {
            content: "";
            position: absolute;
            width: 260px;
            height: 260px;
            right: -100px;
            top: -120px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 162, 200, 0.3), transparent 66%);
            animation: blobFloat 6.5s ease-in-out infinite;
            pointer-events: none;
        }

        .wish-page-card::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            left: -120px;
            bottom: -110px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(165, 201, 255, 0.24), transparent 66%);
            animation: blobFloat 7.6s ease-in-out infinite reverse;
            pointer-events: none;
        }

        .wish-hero {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .wish-hero img {
            display: block;
            width: 100%;
            height: 155px;
            object-fit: cover;
            filter: saturate(1.08);
        }

        .wish-hero-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0.62rem 0.72rem;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(5, 2, 4, 0.7));
        }

        .wish-hero-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            background: rgba(255, 255, 255, 0.12);
            color: #fff2f7;
            font-size: 0.75rem;
            padding: 0.28rem 0.58rem;
            font-weight: 700;
            backdrop-filter: blur(6px);
        }

        .wish-page-kicker {
            margin: 0;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #ffd4e4;
        }

        h1 {
            margin: 0.25rem 0 0.2rem;
            font-family: "Cinzel", serif;
            font-size: clamp(1.35rem, 4vw, 1.85rem);
        }

        .wish-page-subtitle {
            margin: 0 0 1rem;
            color: var(--text-muted);
        }

        @keyframes wishBgDrift {
            0% {
                background-position: 0% 0%, 100% 0%, 50% 50%;
            }
            100% {
                background-position: 12% 10%, 88% 14%, 56% 44%;
            }
        }

        @keyframes wishOrbs {
            0% {
                transform: translate3d(-1.5%, -1.5%, 0) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translate3d(1.6%, 1.2%, 0) scale(1.04);
                opacity: 1;
            }
        }

        form {
            display: grid;
            gap: 0.7rem;
            position: relative;
            z-index: 1;
        }

        .field-wrap {
            display: grid;
            gap: 0.34rem;
        }

        .field-label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #ffd7e6;
            font-weight: 700;
        }

        .field-label svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        input, textarea, button, a {
            font: inherit;
        }

        input, textarea {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.27);
            border-radius: 0.72rem;
            padding: 0.72rem 0.82rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transition: border-color 220ms ease, box-shadow 220ms ease, transform 220ms ease;
        }

        input:focus-visible,
        textarea:focus-visible {
            outline: none;
            border-color: rgba(255, 214, 228, 0.82);
            box-shadow: 0 0 0 3px rgba(255, 197, 220, 0.22);
            transform: translateY(-1px);
        }

        textarea {
            min-height: 105px;
            resize: vertical;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 0.72rem 1rem;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            background: linear-gradient(130deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 12px 24px rgba(244, 128, 155, 0.26);
            transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
        }

        button:hover,
        button:focus-visible {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 16px 28px rgba(244, 128, 155, 0.32);
            outline: none;
        }

        .wish-submit-status {
            margin: 0.6rem 0 0;
            min-height: 1.4rem;
            font-weight: 600;
            color: #ffe4d4;
            position: relative;
            z-index: 1;
        }

        .wish-submit-status.error {
            color: #ffcad4;
        }

        .wish-back-link {
            display: inline-block;
            margin-top: 0.6rem;
            color: #fff7df;
            text-underline-offset: 2px;
            transition: transform 220ms ease, color 220ms ease;
        }

        .wish-back-link:hover,
        .wish-back-link:focus-visible {
            color: #fff;
            transform: translateX(-2px);
            outline: none;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(10px) scale(1.04); }
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 520px) {
            .wish-hero img {
                height: 132px;
            }

            .wish-page-card {
                padding: 0.95rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body,
            body::before,
            .wish-page-card,
            .wish-page-card::before,
            .wish-page-card::after,
            button,
            input,
            textarea,
            .wish-back-link {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <article class="wish-page-card">
        <figure class="wish-hero">
            <img src="https://t3.ftcdn.net/jpg/04/09/09/92/360_F_409099227_cinbeFsXrOrLKZkFzAUYnXRppExHtbXL.jpg" alt="Sneha and Subhadip celebrating together">
        </figure>
        <h1>Send Your Wishes & Blessings</h1>
        <p class="wish-page-subtitle">Write your wish below and submit it to the wishes list.</p>

        <form id="publicWishForm">
            <div class="field-wrap">
                <label class="field-label" for="publicWishName">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.3 0-8 2.2-8 5v1h16v-1c0-2.8-3.7-5-8-5z"/></svg>
                    Your Name
                </label>
                <input id="publicWishName" type="text" maxlength="45" placeholder="Type your name" required>
            </div>

            <div class="field-wrap">
                <label class="field-label" for="publicWishText">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3h16a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H8l-5 3V4a1 1 0 0 1 1-1zm3 4v2h10V7H7zm0 4v2h7v-2H7z"/></svg>
                    Your Wish
                </label>
                <textarea id="publicWishText" maxlength="140" placeholder="Write your blessings for the couple" required></textarea>
            </div>

            <button type="submit">Submit Wish</button>
        </form>

        <p id="publicWishStatus" class="wish-submit-status"></p>
        <a class="wish-back-link" href="index.html">Back to wedding page</a>
    </article>

    <script src="wishes-submit.js"></script>
</body>
</html>
